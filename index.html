<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anjani</title>

<style>
body {
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff4e50,#fc913a);
    color:white;
}

.container{
    margin-top:80px;
    position:relative;
}

h1{
    font-size:60px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px yellow;}
}

/* Cake */
.cake{
    position:relative;
    margin:40px auto;
    width:200px;
}

.layer{
    height:60px;
    border-radius:10px;
    background:#ffb6c1;
    margin-bottom:5px;
}

.layer:nth-child(2){
    background:#ff69b4;
}

.candle{
    width:12px;
    height:45px;
    background:white;
    margin:0 auto;
    position:relative;
}

.flame{
    width:18px;
    height:25px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:-25px;
    left:-3px;
    animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

.love-message{
    display:none;
    margin-top:30px;
    font-size:24px;
}

.surprise-btn{
    background:linear-gradient(45deg,#ff4e8a,#ff9a9e);
    border:none;
    padding:15px 35px;
    font-size:20px;
    color:white;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday Anjani 🎂</h1>


<h2>Double the celebration! On this colorful day.</h2> 
<h2>May your birthday be as sweet as gujiya and as colorful as Holi! 🕯</h2>
<h2>Hope your day is filled with joy, love, and lots of vibrant moments! 🌈🎉</h2>

<div class="cake">
<div class="candle">
<div class="flame"></div>
</div>
<div class="layer"></div>
<div class="layer"></div>
</div>

<div class="love-message" id="loveMsg">
🌹 Your wish is on its way...  
Happy Birthday to my favorite human! 🥳💖✨
</div>

</div>

<audio id="bgMusic" loop>
<source src="birthdaySong.mp3" type="audio/mp3">
</audio>

<canvas id="confetti"></canvas>

<script>

function startSurprise(){

    setTimeout(function(){

        document.getElementById("flame").style.display="none";
        document.getElementById("loveMsg").style.display="block";
        document.getElementById("bgMusic").play();

    },5000);

}


// Confetti
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

for(let i=0;i<150;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*6+4,
color:`hsl(${Math.random()*360},100%,50%)`,
speed:Math.random()*3+2
});
}

function updateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height){
p.y=-10;
p.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(updateConfetti);
}

updateConfetti();

</script>

</body>
</html>
